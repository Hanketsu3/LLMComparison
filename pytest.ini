[pytest]
# Pytest configuration for LLMComparison project

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --disable-warnings
    --tb=short
    --color=yes

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests combining multiple components
    slow: Slow tests that may timeout (e.g., model loading)
    models: Tests for model wrappers and loading
    evaluation: Tests for evaluation metrics
    data: Tests for data loaders
    registry: Tests for model registry
    skip_ci: Skip in CI/CD pipelines

# Timeout for slow tests (in seconds)
timeout = 300

# Logging
log_cli = false
log_cli_level = INFO
log_file = test_results.log
log_file_level = DEBUG
