# ============================================================================
# SPECIALIST MODELS - MAIN BENCHMARK (3 Models)
# ============================================================================
# Radiology-expert models specialized for chest X-ray analysis and radiology
# report generation, with advanced grounding capabilities.
# 
# NOTE: Specialist models in EXTRA TRACK moved to: extra_track_ocr.yaml
#   - GOT-OCR-2 (document OCR, not radiology)
#   - Nougat (PDF parsing, not radiology)
#   - MatCha (chart QA, not radiology)

models:
  chexagent:
    name: "StanfordAIMI/CheXagent-8b"
    type: "local"
    provider: "huggingface"
    
    # Architecture
    architecture:
      vision_encoder: "google/siglip-so400m-patch14-384"
      language_model: "meta-llama/Llama-3-8B"
      connector: "mlp2x_gelu"
    
    # Model loading
    loading:
      device_map: "auto"
      torch_dtype: "bfloat16"
      load_in_4bit: false
      use_flash_attention: true
    
    # Generation settings
    generation:
      max_new_tokens: 512
      temperature: 0.0
      num_beams: 1
      do_sample: false
    
    # CheXagent specific capabilities
    capabilities:
      - "report_generation"
      - "view_classification"
      - "abnormality_detection"
      - "phrase_grounding"

  llava_rad:
    name: "microsoft/llava-rad"
    type: "local"
    provider: "huggingface"
    
    # Architecture
    architecture:
      vision_encoder: "BioMedCLIP"
      language_model: "Vicuna-7B"
    
    # Model loading
    loading:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: true
      use_flash_attention: true
    
    # Generation settings
    generation:
      max_new_tokens: 512
      temperature: 0.0
      top_p: 1.0
    
    # Image processing (radiology-specific)
    image_processing:
      size: 512
      normalize: true
      contrast_enhancement: true

  radfm:
    name: "StanfordAIMI/RadFM-7B"
    type: "local"
    provider: "huggingface"
    
    # Architecture
    architecture:
      vision_encoder: "MedCLIP"
      language_model: "LLaMA-7B"
      multimodal_fusion: "early"
    
    # Model loading
    loading:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: true
      use_flash_attention: true
    
    # Generation settings
    generation:
      max_new_tokens: 512
      temperature: 0.0
    
    # RadFM specifics
    supported_modalities:
      - "chest_xray"
      - "ct"
      - "mri"
