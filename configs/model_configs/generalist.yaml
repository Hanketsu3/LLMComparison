# ============================================================================
# GENERALIST MODELS - MAIN BENCHMARK (8 Models)
# ============================================================================
# These are general-purpose, lightweight vision-language models suitable
# for direct comparison on radiology benchmarks. 
# 
# NOTE: API models (GPT-4V, Gemini) moved to: extra_track_api.yaml

models:
  qwen2_vl_2b:
    name: "Qwen/Qwen2-VL-2B-Instruct"
    type: "local"
    provider: "huggingface"
    loading:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: false

  qwen2_5_vl_3b:
    name: "Qwen/Qwen2.5-VL-3B-Instruct"
    type: "local"
    provider: "huggingface"
    loading:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: true

  qwen3_vl_2b:
    name: "Qwen/Qwen3-VL-2B-Instruct"
    type: "local"
    provider: "huggingface"
    loading:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: true

  phi3_5_vision:
    name: "microsoft/Phi-3.5-vision-instruct"
    type: "local"
    provider: "huggingface"
    loading:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: false

  smolvlm2_2b:
    name: "HuggingFaceTB/SmolVLM2-2.2B-Instruct"
    type: "local"
    provider: "huggingface"
    loading:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: false

  internvl2_2b:
    name: "OpenGVLab/InternVL2-2B"
    type: "local"
    provider: "huggingface"
    loading:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: false

  internvl2_4b:
    name: "OpenGVLab/InternVL2-4B"
    type: "local"
    provider: "huggingface"
    loading:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: true

  llama3_vision:
    name: "meta-llama/Llama-3.2-11B-Vision-Instruct"
    type: "local"
    provider: "huggingface"
    loading:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: true
      use_flash_attention: true
    generation:
      max_new_tokens: 512
      temperature: 0.0
      top_p: 1.0
