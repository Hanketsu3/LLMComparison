name: llmcomp-base
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch::pytorch::py311*
  - pytorch::pytorch-cuda=11.8
  - pytorch::pytorch-cuda=11.8
  - pytorch::torchvision
  - pytorch::pytorch
  - conda-forge::cuda-version=11.8
  - pip
  - pip:
    # Core ML/DL
    - torch>=2.0.0
    - torchvision>=0.15.0
    - transformers>=4.35.0
    - accelerate>=0.24.0
    - bitsandbytes>=0.41.0
    
    # Data & DSP
    - datasets>=2.14.0
    - numpy>=1.24.0
    - pandas>=2.0.0
    - scikit-learn>=1.3.0
    - scipy>=1.11.0
    
    # Evaluation
    - evaluate>=0.4.0
    - rouge-score>=0.1.2
    
    # Utilities
    - pyyaml>=6.0
    - python-dotenv>=1.0.0
    - tqdm>=4.66.0
    - omegaconf>=2.3.0
    - hydra-core>=1.3.0
    - Pillow>=10.0.0
    
    # Vision
    - Pillow>=10.0.0
    
    # Notebooks
    - jupyter>=1.0.0
    - ipywidgets>=8.0.0
    - ipykernel>=6.0.0
    
    # CLI
    - typer>=0.9.0
    - rich>=13.0.0
    
    # Experiment tracking
    - wandb>=0.16.0
