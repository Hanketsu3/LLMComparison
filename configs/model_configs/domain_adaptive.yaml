# ============================================================================
# DOMAIN-ADAPTIVE MODELS - MAIN BENCHMARK (3 Models)
# ============================================================================
# Medical/biomedical-specialized models trained with medical context.
# 
# NOTE: Domain models in EXTRA TRACK moved to: extra_track_domain.yaml
#   - Qwen2-VL-OCR (document-focused, not radiology)
#   - Latxa-Qwen3-VL (language-specific, not English)
#   - Med-PaLM (API-based, cost tracking required)

models:
  llava_med:
    name: "microsoft/llava-med-v1.5-vicuna-7b"
    type: "local"
    provider: "huggingface"
    
    # Architecture
    architecture:
      vision_encoder: "openai/clip-vit-large-patch14-336"
      language_model: "mistralai/Mistral-7B-Instruct-v0.2"
      vision_feature_layer: -2
      vision_feature_select_strategy: "default"
    
    # Model loading
    loading:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: true
      use_flash_attention: true
    
    # Generation settings
    generation:
      max_new_tokens: 512
      temperature: 0.0
      top_p: 1.0
      do_sample: false

  medgemma_4b_it:
    name: "google/medgemma-4b-it"
    type: "local"
    provider: "huggingface"
    loading:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: true
    generation:
      max_new_tokens: 512
      temperature: 0.0

  biomedgpt:
    name: "PharMolix/BiomedGPT-LM-7B"
    type: "local"
    provider: "huggingface"
    loading:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: true
      use_flash_attention: true
    generation:
      max_new_tokens: 512
      temperature: 0.0
